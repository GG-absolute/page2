<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./output.css">
</head>
<body>
    
<header class="w-full font-sans select-none text-[#1c1c1e]">
  <div class="h-1.5 w-full bg-linear-to-r from-[#00C65E] to-[white]/5"></div>

  <div class="w-full bg-white border-b border-zinc-100 px-4">
    <div class="max-w-[1200px] mx-auto h-14 flex items-center justify-between text-xs font-normal">
      
      <div class="flex items-center h-full">
        <a href="/" class="mr-8 flex-shrink-0">
          <img src="../imgmsuhammad/Logo (8).png" alt="Dily.ru" class="h-6 object-contain">
        </a>
        <nav class="flex items-center h-full">
          <a href="#" class="px-4 py-5 hover:text-zinc-500 transition">Доска объявлений</a>
          <a href="#" class="px-4 py-5 hover:text-zinc-500 transition">Сервисный центр</a>
          <a href="#" class="px-5 py-5 bg-[#28d77a6e] font-medium text-[#363A45] transition">Интернет-магазин Dily.ru</a>
          <a href="#" class="px-5 py-5 hover:text-zinc-500 transition">Скупка</a>
        </nav>
      </div>

      <div class="flex items-center gap-6">
        <div class="flex items-center gap-1.5 cursor-pointer text-zinc-500 hover:text-zinc-800 transition">
<img src="../imgmsuhammad/off.png" alt="">
          <span class="text-zinc-800">Москва</span>
          <svg class="w-3 h-3 text-zinc-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
          </svg>
        </div>
        
        <button class="flex items-center gap-1.5 font-medium hover:text-zinc-600 transition">
          <svg class="w-4 h-4 text-[#00cc66]" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
          </svg>
          <span>Вход/ регистрация</span>
        </button>
      </div>

    </div>
  </div>

  <div class="w-full bg-[#f6f6f6] px-4 py-3">
    <div class="max-w-[1200px] mx-auto flex items-center justify-between gap-4">
      
      <div class="flex items-center gap-6 text-sm font-medium whitespace-nowrap">
        <button class="flex items-center gap-2 text-[#00cc66] hover:opacity-80 transition">
          <svg class="w-4 h-4 stroke-[2.5]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
          <span>Каталог товаров</span>
        </button>
        
        <a href="#" class="flex items-center gap-2 text-zinc-700 hover:text-black transition">
          <svg class="w-4 h-4 text-zinc-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 17a2 2 0 11-4 0 2 2 0 014 0zM19 17a2 2 0 11-4 0 2 2 0 014 0z" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M13 16V6a1 1 0 00-1-1H4a1 1 0 00-1 1v10a1 1 0 001 1h1m16-2V9a1 1 0 00-1-1h-3v7m3 0h1m-4 0h-4m-1 0H9" />
          </svg>
          <span class="text-xs font-normal">Доставка и оплата</span>
        </a>
      </div>

      <div class="flex-1 max-w-xl h-9 flex bg-white border border-zinc-200 rounded-full overflow-hidden focus-within:border-zinc-400 transition">
        <div class="flex items-center pl-3.5 pr-2 text-zinc-400">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
          </svg>
        </div>
        <input type="text" placeholder="Я хочу купить" class="w-full bg-transparent text-xs text-black outline-none placeholder-zinc-400">
        <button class="bg-[#dcdcdc] hover:bg-zinc-300 text-zinc-800 text-xs font-medium px-5 transition h-full">
          Найти
        </button>
      </div>

      <div class="flex items-center gap-5 text-zinc-700 whitespace-nowrap">
        <a href="#" class="text-xs font-normal hover:text-black transition">Поддержка</a>
        
        <div class="flex items-center gap-4 text-zinc-600">
          <button class="relative hover:text-black transition">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01" />
            </svg>
            <span class="absolute -bottom-1 -right-1 w-3.5 h-3.5 bg-[#00cc66] text-white text-[9px] font-bold rounded-full flex items-center justify-center border border-white">+</span>
          </button>
          
          <button class="hover:text-black transition">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8">
              <path stroke-linecap="round" stroke-linejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
            </svg>
          </button>
          
          <button class="hover:text-black transition">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 0a2 2 0 100 4 2 2 0 000-4z" />
            </svg>
          </button>
        </div>
      </div>

    </div>
  </div>
</header>

</body>
</html>
